name: KB Update Pipeline

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD). Default: yesterday.'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new transcripts
        run: |
          FROM_DATE="${{ github.event.inputs.from_date }}"
          if [ -n "$FROM_DATE" ]; then
            python 1_fetch_transcripts.py --from-date $FROM_DATE
          else
            python 1_fetch_transcripts.py
          fi

      - name: Update KB chunks
        run: |
          FROM_DATE="${{ github.event.inputs.from_date }}"
          if [ -n "$FROM_DATE" ]; then
            python 5_update_kb.py --from-date $FROM_DATE
          else
            YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
            python 5_update_kb.py --from-date $YESTERDAY
          fi

      - name: Scrape promotions page (Pazartesi)
        if: false
        run: python 6_scrape_promotions.py

      - name: Notify dashboard
        if: always()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          REPO: ${{ github.repository }}
        run: |
          curl -sf -X POST http://80.240.17.15/webhook -H "Content-Type: application/json" -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" -d "{\"project\":\"${REPO}\"}" || true

    env:
      ZOHO_CLIENT_ID:       ${{ secrets.ZOHO_CLIENT_ID }}
      ZOHO_CLIENT_SECRET:   ${{ secrets.ZOHO_CLIENT_SECRET }}
      ZOHO_REFRESH_TOKEN:   ${{ secrets.ZOHO_REFRESH_TOKEN }}
      ZOHO_SCREEN_NAME:     ${{ secrets.ZOHO_SCREEN_NAME }}
      ZOHO_ACCOUNTS_URL:    https://accounts.zoho.eu
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
