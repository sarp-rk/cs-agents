name: KB Update Pipeline

on:
  schedule:
    - cron: '0 11 * * *'   # 12:00 CET (UTC+1)
    - cron: '0 19 * * *'   # 20:00 CET (UTC+1)
  workflow_dispatch:        # Manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new transcripts
        run: python 1_fetch_transcripts.py

      - name: Update KB chunks
        run: python 5_update_kb.py

    env:
      ZOHO_CLIENT_ID:       ${{ secrets.ZOHO_CLIENT_ID }}
      ZOHO_CLIENT_SECRET:   ${{ secrets.ZOHO_CLIENT_SECRET }}
      ZOHO_REFRESH_TOKEN:   ${{ secrets.ZOHO_REFRESH_TOKEN }}
      ZOHO_SCREEN_NAME:     ${{ secrets.ZOHO_SCREEN_NAME }}
      ZOHO_ACCOUNTS_URL:    https://accounts.zoho.eu
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
